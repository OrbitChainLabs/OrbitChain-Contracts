# Pull-request triage (issue #127).
#
# Runs `actions/labeler@v5` with the configuration in
# `.github/labeler.yml`. Each PR gets `api`, `cli`, `frontend`, `ci`,
# `documentation`, `storage`, `testing`, or `security` applied based on
# which file globs the PR touches.
#
# Switched from `pull_request_target` to `pull_request` so that the
# workflow definition and configuration both come from the PR branch.
# This allows fixes to `.github/labeler.yml` to take effect immediately
# rather than requiring a prior merge to main.

name: Pull Request Labeler

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:

jobs:
  labeler:
    name: Apply file-glob → label mapping
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
