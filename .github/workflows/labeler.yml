# Pull-request triage (issue #127).
#
# Runs `actions/labeler@v5` with the configuration in
# `.github/labeler.yml`. Each PR gets `api`, `cli`, `frontend`, `ci`,
# `documentation`, `storage`, `testing`, or `security` applied based on
# which file globs the PR touches.
#
# Uses `pull_request_target` so that `pull-requests: write` permission is
# available even for fork PRs.  An explicit `actions/checkout` of the PR
# head ref is included so that `.github/labeler.yml` is read from the PR
# branch (allows config fixes to ship with the PR that introduces them).
#
# NOTE: the checkout step only activates once this change lands on the
# base branch.  Until then, the labeler reads the base-branch config.

name: Pull Request Labeler

permissions:
  contents: read
  pull-requests: write

on:
  - pull_request_target

jobs:
  labeler:
    name: Apply file-glob → label mapping
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
