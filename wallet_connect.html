<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrbitChain – Wallet Connect</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f4ff; }
    .card { background: #fff; border-radius: 12px; padding: 2rem 2.5rem; box-shadow: 0 4px 20px rgba(0,0,0,.1); text-align: center; min-width: 320px; max-width: 90vw; }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; color: #1a1a2e; }
    #connect-btn { background: #5b6af0; color: #fff; border: none; border-radius: 8px; padding: .75rem 1.75rem; font-size: 1rem; cursor: pointer; transition: background .2s; }
    #connect-btn:hover { background: #4451d4; }
    #connect-btn:disabled { background: #a0a8f8; cursor: default; }
    #wallet-info { margin-top: 1.25rem; display: none; }
    #wallet-info p { margin: .4rem 0; color: #444; font-size: .9rem; }
    #wallet-address { font-family: monospace; font-size: .85rem; word-break: break-all; background: #f5f5f5; padding: .5rem .75rem; border-radius: 6px; color: #222; }
    #status { margin-top: .75rem; font-size: .85rem; color: #888; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-right: 6px; }

    /* Mobile wallet picker */
    #wallet-picker-overlay { display: none; position: fixed; inset: 0; background: rgba(20,20,40,.45); align-items: center; justify-content: center; padding: 1rem; z-index: 10; }
    #wallet-picker-overlay.open { display: flex; }
    #wallet-picker { background: #fff; border-radius: 12px; padding: 1.5rem; width: 320px; max-width: 100%; text-align: left; }
    #wallet-picker h2 { margin: 0 0 .25rem; font-size: 1.1rem; color: #1a1a2e; }
    #wallet-picker .hint { margin: 0 0 1rem; font-size: .8rem; color: #888; }
    .wallet-option { display: flex; align-items: center; gap: .6rem; width: 100%; padding: .65rem .75rem; margin-bottom: .5rem; border: 1px solid #e2e4f5; border-radius: 8px; background: #fafbff; cursor: pointer; font-size: .95rem; color: #1a1a2e; }
    .wallet-option:hover { background: #eef0ff; border-color: #5b6af0; }
    .wallet-option .icon { font-size: 1.2rem; }
    #pubkey-input { width: 100%; box-sizing: border-box; padding: .6rem .7rem; border: 1px solid #d7dae8; border-radius: 8px; font-family: monospace; font-size: .82rem; margin: .5rem 0 .75rem; display: none; }
    #wallet-picker-cancel { background: none; border: none; color: #888; font-size: .85rem; cursor: pointer; margin-top: .25rem; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/6.0.1/index.min.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>🌟 OrbitChain Wallet Connect</h1>
    <button id="connect-btn">Connect Wallet</button>

    <div id="wallet-info">
      <p><span class="dot"></span><strong>Wallet Connected</strong></p>
      <p>Address:</p>
      <div id="wallet-address"></div>
    </div>

    <p id="status" aria-live="polite"></p>
  </div>

  <!-- Mobile wallet picker: shown instead of the Freighter path when
       OrbitWalletConnect.isMobile() is true. See wallet_connect.js and
       docs/tutorials/dapp-integration.md for the SEP-10 / SEP-0007 flow. -->
  <div id="wallet-picker-overlay">
    <div id="wallet-picker">
      <h2>Choose a wallet</h2>
      <p class="hint">Detected mobile device. Pick your Stellar wallet to continue.</p>
      <div id="wallet-options"></div>
      <input id="pubkey-input" type="text" placeholder="Paste your Stellar public key (G…)" />
      <div>
        <button id="wallet-picker-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="wallet_connect.js" defer></script>
</body>
</html>
